{% extends "base.html" %}
{% block title %}登录 · MediaPush{% endblock %}
{% block content %}
<div class="login-wrap">
  <h1>MediaPush 管理后台</h1>
  <div class="card">
    {% if error %}<div class="msg err">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="row">
        <label>管理员密码</label>
        <input type="password" name="password" autofocus required>
      </div>
      <button type="submit">登录</button>
    </form>
  </div>
  <p class="hint">首次启动的随机密码已打印在服务启动日志中，登录后请在「配置」页修改。</p>
</div>
{% endblock %}
